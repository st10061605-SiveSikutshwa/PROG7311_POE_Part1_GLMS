version: '3.8'

services:

  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Password123!"
    ports:
      - "1433:1433"

  glms-backend-api:
    build:
      context: ./GLMS.API
    container_name: glms-backend-api
    depends_on:
      - sql-server-db
    ports:
      - "7111:8080"

  glms-frontend-web:
    build:
      context: ./GLMS
    container_name: glms-frontend-web
    depends_on:
      - glms-backend-api
    ports:
      - "5000:8080"